openapi: 3.0.3
info:
  title: POS Application API - Coffee & Bakery Friendly Edition
  version: 0.1.0
  description: |
    REST API untuk POS Application MVP berbasis Laravel API dan PostgreSQL/Supabase.

    API ini dibuat untuk operasional POS sederhana: kelola produk, catat stok,
    proses transaksi, lalu pantau ringkasan harian dari dashboard.

    ### Fitur utama

    * Cek API hidup atau tidak dengan endpoint health check.
    * Pantau omzet hari ini, transaksi hari ini, dan produk stok rendah.
    * Kelola kategori, produk, pelanggan, dan supplier.
    * Catat stok masuk, stok keluar manual, dan adjustment stok.
    * Buat transaksi penjualan multi item dengan diskon, pajak, metode bayar, dan kembalian.
    * Response sales memuat customer dan item sehingga frontend dapat membuat struk dan cetak ulang dari riwayat.

    ### Catatan penting

    * API ini masih MVP dan belum memakai autentikasi backend.
    * Password gate, bilingual UI, dan cetak struk Bluetooth berada di frontend, bukan endpoint API.
    * Cetak struk memakai Web Bluetooth dan data transaksi dari response `/sales`.
    * Fitur `Try it out` akan berjalan jika backend Laravel aktif di `http://127.0.0.1:8000/api`.
    * Untuk production, tambahkan login, role, audit trail, dan pembatasan CORS terlebih dahulu.
  contact:
    name: POS Application Maintainer
    email: maintainer@example.com
  license:
    name: Internal / Learning Project
servers:
  - url: http://127.0.0.1:8000/api
    description: Local Laravel API - cocok untuk testing di laptop
tags:
  - name: Health
    description: Tempat cek napas API. Kalau ini gagal, endpoint lain biasanya ikut tidak enak badan.
  - name: Dashboard
    description: Ringkasan harian untuk owner dan admin.
  - name: Categories
    description: Rak kecil untuk mengelompokkan produk.
  - name: Products
    description: Master produk, SKU, harga, stok, dan batas stok rendah.
  - name: Customers
    description: Data pelanggan sederhana. Walk-in customer tetap boleh tanpa data pelanggan.
  - name: Suppliers
    description: Data supplier sebagai referensi operasional.
  - name: Stock Movements
    description: Riwayat stok masuk, keluar, adjustment, dan perubahan otomatis dari penjualan.
  - name: Sales
    description: Mesin kasir utama untuk membuat transaksi penjualan. Data response dipakai frontend untuk popup dan cetak ulang struk.
externalDocs:
  description: Dokumen lengkap BA, SA, SOP, dan maintenance
  url: ./README.md
paths:
  /health:
    get:
      tags: [Health]
      summary: Cek apakah API sedang hidup
      description: Endpoint sederhana untuk memastikan backend Laravel bisa diakses.
      responses:
        "200":
          description: API aktif
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /dashboard:
    get:
      tags: [Dashboard]
      summary: Ambil ringkasan toko hari ini
      description: Mengambil omzet hari ini, jumlah transaksi, total produk, stok rendah, dan transaksi terbaru.
      responses:
        "200":
          description: Ringkasan operasional
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"
  /categories:
    get:
      tags: [Categories]
      summary: Lihat daftar kategori produk
      description: Mengambil daftar kategori dengan dukungan pencarian nama dan pagination.
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCategories"
    post:
      tags: [Categories]
      summary: Tambah kategori baru
      description: Membuat kategori agar produk lebih rapi saat dicari atau dikelompokkan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
            examples:
              coffee:
                summary: Kategori coffee
                value:
                  name: Coffee
                  description: Minuman kopi panas dan dingin
                  is_active: true
      responses:
        "201":
          description: Kategori berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "422":
          $ref: "#/components/responses/ValidationError"
  /categories/{id}:
    get:
      tags: [Categories]
      summary: Lihat detail kategori
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Detail kategori
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Categories]
      summary: Ubah kategori
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
            examples:
              bakery:
                summary: Update kategori bakery
                value:
                  name: Bakery
                  description: Produk roti dan pastry
                  is_active: true
      responses:
        "200":
          description: Kategori berhasil diupdate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Categories]
      summary: Hapus kategori
      description: Jika kategori dihapus, produk yang memakai kategori tersebut akan kehilangan relasi kategori.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Kategori berhasil dihapus
        "404":
          $ref: "#/components/responses/NotFound"
  /products:
    get:
      tags: [Products]
      summary: Lihat daftar produk
      description: Mengambil produk beserta kategori. Bisa mencari berdasarkan nama atau SKU.
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProducts"
    post:
      tags: [Products]
      summary: Tambah produk baru
      description: Membuat master produk dengan SKU unik, harga modal, harga jual, stok awal, dan minimum stok.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
            examples:
              espresso:
                summary: Produk coffee
                value:
                  category_id: 1
                  sku: COF-ESP-001
                  name: Espresso
                  description: Single shot espresso
                  cost_price: 8000
                  selling_price: 18000
                  stock_quantity: 50
                  minimum_stock: 10
                  is_active: true
      responses:
        "201":
          description: Produk berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "422":
          $ref: "#/components/responses/ValidationError"
  /products/{id}:
    get:
      tags: [Products]
      summary: Lihat detail produk
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Detail produk
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Products]
      summary: Ubah produk
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
            examples:
              croissant:
                summary: Produk bakery
                value:
                  category_id: 2
                  sku: BRD-CRS-001
                  name: Butter Croissant
                  description: Croissant butter untuk display pagi
                  cost_price: 9000
                  selling_price: 22000
                  stock_quantity: 20
                  minimum_stock: 5
                  is_active: true
      responses:
        "200":
          description: Produk berhasil diupdate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Products]
      summary: Hapus produk
      description: Hati-hati menghapus produk yang sudah pernah dipakai transaksi.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Produk berhasil dihapus
        "404":
          $ref: "#/components/responses/NotFound"
  /customers:
    get:
      tags: [Customers]
      summary: Lihat daftar pelanggan
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated customers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCustomers"
    post:
      tags: [Customers]
      summary: Tambah pelanggan baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
            examples:
              member:
                summary: Pelanggan langganan
                value:
                  name: Budi Santoso
                  phone: "081234567890"
                  email: budi@example.com
                  address: Jakarta
      responses:
        "201":
          description: Pelanggan berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "422":
          $ref: "#/components/responses/ValidationError"
  /customers/{id}:
    get:
      tags: [Customers]
      summary: Lihat detail pelanggan
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Detail pelanggan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Customers]
      summary: Ubah pelanggan
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
            examples:
              updateCustomer:
                summary: Update pelanggan
                value:
                  name: Budi Santoso
                  phone: "081234567890"
                  email: budi.santoso@example.com
                  address: Jakarta Selatan
      responses:
        "200":
          description: Pelanggan berhasil diupdate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Customers]
      summary: Hapus pelanggan
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Pelanggan berhasil dihapus
  /suppliers:
    get:
      tags: [Suppliers]
      summary: Lihat daftar supplier
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated suppliers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSuppliers"
    post:
      tags: [Suppliers]
      summary: Tambah supplier baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierInput"
            examples:
              coffeeSupplier:
                summary: Supplier biji kopi
                value:
                  name: Supplier Kopi Nusantara
                  phone: "081122334455"
                  email: sales@kopinusantara.example
                  address: Bandung
                  contact_person: Rina
      responses:
        "201":
          description: Supplier berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "422":
          $ref: "#/components/responses/ValidationError"
  /suppliers/{id}:
    get:
      tags: [Suppliers]
      summary: Lihat detail supplier
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Detail supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
    put:
      tags: [Suppliers]
      summary: Ubah supplier
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierInput"
            examples:
              bakerySupplier:
                summary: Supplier bahan bakery
                value:
                  name: Supplier Bahan Bakery
                  phone: "081199887766"
                  email: bakery@example.com
                  address: Tangerang
                  contact_person: Andi
      responses:
        "200":
          description: Supplier berhasil diupdate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Suppliers]
      summary: Hapus supplier
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Supplier berhasil dihapus
  /stock-movements:
    get:
      tags: [Stock Movements]
      summary: Lihat riwayat pergerakan stok
      description: Menampilkan histori stok masuk, stok keluar, adjustment, dan stok keluar dari transaksi penjualan.
      parameters:
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated stock movements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedStockMovements"
    post:
      tags: [Stock Movements]
      summary: Catat stok masuk, keluar, atau adjustment
      description: Gunakan untuk restock, koreksi stok fisik, atau stok keluar non-penjualan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockMovementInput"
            examples:
              restock:
                summary: Restock produk
                value:
                  product_id: 1
                  type: in
                  quantity: 10
                  notes: Restock pagi
              stockOpname:
                summary: Adjustment hasil stock opname
                value:
                  product_id: 1
                  type: adjustment
                  quantity: 47
                  notes: Koreksi setelah hitung fisik
      responses:
        "201":
          description: Stock movement berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"
        "422":
          $ref: "#/components/responses/ValidationError"
  /stock-movements/{id}:
    get:
      tags: [Stock Movements]
      summary: Lihat detail pergerakan stok
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Detail stock movement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"
  /sales:
    get:
      tags: [Sales]
      summary: Lihat riwayat transaksi penjualan
      description: Mengambil riwayat transaksi dengan pagination dan pencarian invoice, pelanggan, produk, SKU, metode bayar, atau status.
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated sales
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSales"
    post:
      tags: [Sales]
      summary: Buat transaksi penjualan
      description: |
        Membuat transaksi penjualan, menghitung total, menyimpan sale item,
        mengurangi stok, dan membuat stock movement otomatis.

        Sistem akan menolak transaksi jika produk tidak aktif, stok kurang,
        diskon terlalu besar, atau nominal pembayaran kurang dari total.

        Frontend menggunakan response transaksi berhasil untuk menampilkan popup
        `Cetak Struk` / `Tutup`. Proses cetak struk dilakukan oleh frontend
        melalui Web Bluetooth, bukan oleh API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaleInput"
            examples:
              simpleCashSale:
                summary: Transaksi cash sederhana
                value:
                  customer_id: null
                  discount_amount: 0
                  tax_amount: 0
                  paid_amount: 50000
                  payment_method: cash
                  notes: Walk-in customer
                  items:
                    - product_id: 1
                      quantity: 2
                      discount_amount: 0
              qrisWithDiscount:
                summary: Transaksi QRIS dengan diskon
                value:
                  customer_id: 1
                  discount_amount: 5000
                  tax_amount: 0
                  paid_amount: 40000
                  payment_method: qris
                  notes: Diskon pelanggan tetap
                  items:
                    - product_id: 1
                      quantity: 1
                      discount_amount: 0
                    - product_id: 2
                      quantity: 1
                      discount_amount: 2000
      responses:
        "201":
          description: Transaksi berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "422":
          $ref: "#/components/responses/ValidationError"
  /sales/{id}:
    get:
      tags: [Sales]
      summary: Lihat detail transaksi penjualan
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Detail transaksi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        example: 1
    Search:
      name: search
      in: query
      required: false
      schema:
        type: string
        example: espresso
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
        example: 1
    PerPage:
      name: per_page
      in: query
      required: false
      schema:
        type: integer
        default: 15
        example: 15
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Record tidak ditemukan
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        last_page:
          type: integer
    PaginatedCategories:
      allOf:
        - $ref: "#/components/schemas/PaginationMeta"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Category"
    PaginatedProducts:
      allOf:
        - $ref: "#/components/schemas/PaginationMeta"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Product"
    PaginatedCustomers:
      allOf:
        - $ref: "#/components/schemas/PaginationMeta"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Customer"
    PaginatedSuppliers:
      allOf:
        - $ref: "#/components/schemas/PaginationMeta"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Supplier"
    PaginatedStockMovements:
      allOf:
        - $ref: "#/components/schemas/PaginationMeta"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/StockMovement"
    PaginatedSales:
      allOf:
        - $ref: "#/components/schemas/PaginationMeta"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Sale"
    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 120
          example: Coffee
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
          example: true
    Category:
      allOf:
        - $ref: "#/components/schemas/CategoryInput"
        - type: object
          properties:
            id:
              type: integer
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    ProductInput:
      type: object
      required: [sku, name, cost_price, selling_price]
      properties:
        category_id:
          type: integer
          nullable: true
          example: 1
        sku:
          type: string
          maxLength: 80
          example: COF-ESP-001
        name:
          type: string
          maxLength: 160
          example: Espresso
        description:
          type: string
          nullable: true
        cost_price:
          type: number
          format: double
          minimum: 0
          example: 8000
        selling_price:
          type: number
          format: double
          minimum: 0
          example: 18000
        stock_quantity:
          type: integer
          minimum: 0
          example: 50
        minimum_stock:
          type: integer
          minimum: 0
          example: 10
        is_active:
          type: boolean
          example: true
    Product:
      allOf:
        - $ref: "#/components/schemas/ProductInput"
        - type: object
          properties:
            id:
              type: integer
            category:
              nullable: true
              allOf:
                - $ref: "#/components/schemas/Category"
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    CustomerInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 160
          example: Walk In Customer
        phone:
          type: string
          nullable: true
          maxLength: 40
        email:
          type: string
          nullable: true
          format: email
        address:
          type: string
          nullable: true
    Customer:
      allOf:
        - $ref: "#/components/schemas/CustomerInput"
        - type: object
          properties:
            id:
              type: integer
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    SupplierInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 160
          example: Supplier Kopi Nusantara
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
          format: email
        address:
          type: string
          nullable: true
        contact_person:
          type: string
          nullable: true
          maxLength: 160
    Supplier:
      allOf:
        - $ref: "#/components/schemas/SupplierInput"
        - type: object
          properties:
            id:
              type: integer
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    StockMovementInput:
      type: object
      required: [product_id, type, quantity]
      properties:
        product_id:
          type: integer
          example: 1
        type:
          type: string
          enum: [in, out, adjustment]
          example: in
        quantity:
          type: integer
          minimum: 1
          example: 10
        notes:
          type: string
          nullable: true
          example: Restock manual
    StockMovement:
      allOf:
        - $ref: "#/components/schemas/StockMovementInput"
        - type: object
          properties:
            id:
              type: integer
            reference_type:
              type: string
              nullable: true
              example: manual
            reference_id:
              type: integer
              nullable: true
            product:
              $ref: "#/components/schemas/Product"
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    SaleItemInput:
      type: object
      required: [product_id, quantity]
      properties:
        product_id:
          type: integer
          example: 1
        quantity:
          type: integer
          minimum: 1
          example: 2
        discount_amount:
          type: number
          format: double
          minimum: 0
          example: 0
    SaleInput:
      type: object
      required: [paid_amount, payment_method, items]
      properties:
        customer_id:
          type: integer
          nullable: true
          example: 1
        discount_amount:
          type: number
          format: double
          minimum: 0
          example: 0
        tax_amount:
          type: number
          format: double
          minimum: 0
          example: 0
        paid_amount:
          type: number
          format: double
          minimum: 0
          example: 50000
        payment_method:
          type: string
          enum: [cash, qris, card, transfer]
          example: cash
        notes:
          type: string
          nullable: true
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SaleItemInput"
    SaleItem:
      type: object
      properties:
        id:
          type: integer
        sale_id:
          type: integer
        product_id:
          type: integer
        quantity:
          type: integer
        unit_price:
          type: number
          format: double
        discount_amount:
          type: number
          format: double
        line_total:
          type: number
          format: double
        product:
          $ref: "#/components/schemas/Product"
    Sale:
      type: object
      properties:
        id:
          type: integer
        customer_id:
          type: integer
          nullable: true
        invoice_number:
          type: string
          example: INV-20260604103000-ABCD
        sale_date:
          type: string
          format: date-time
        subtotal:
          type: number
          format: double
        discount_amount:
          type: number
          format: double
        tax_amount:
          type: number
          format: double
        total_amount:
          type: number
          format: double
        paid_amount:
          type: number
          format: double
        change_amount:
          type: number
          format: double
        payment_method:
          type: string
          enum: [cash, qris, card, transfer]
        status:
          type: string
